name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip Renovate PRs (lockfile/dependency churn doesn't need Claude review)
    # and draft PRs (avoid burning the OAuth token quota during WIP).
    if: |
      github.event.pull_request.user.login != 'renovate[bot]' &&
      github.event.pull_request.draft == false

    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # `--comment` を付けないと plugin は端末出力のみで PR に投稿しない
          # (plugins/code-review/commands/code-review.md ステップ 7 参照)
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          # plugin frontmatter の allowed-tools を Action 側でも明示しないと
          # 投稿系コールが permission_denials で弾かれる
          # yamllint disable-line rule:line-length
          claude_args: '--allowedTools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),mcp__github_inline_comment__create_inline_comment"'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      # サイレント失敗 (success 終了だが投稿ゼロ) の調査用に turn ごとの
      # stream JSON を artifact 保存する
      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-execution-output-pr-${{ github.event.pull_request.number }}
          path: ${{ runner.temp }}/claude-execution-output.json
          retention-days: 7
          if-no-files-found: warn
