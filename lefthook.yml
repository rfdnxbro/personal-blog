pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css,md}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files} && git add {staged_files}
      stage_fixed: true
    typecheck:
      glob: "{*.{ts,tsx},tsconfig*.json,package.json,pnpm-lock.yaml}"
      run: pnpm exec tsc -p . --noEmit
    vitest:
      glob: "*.{ts,tsx}"
      run: pnpm exec vitest related --run {staged_files}
